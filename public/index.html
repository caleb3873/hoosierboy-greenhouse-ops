<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a2a1a" />
    <meta name="description" content="Hoosier Boy Greenhouse Ops" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow" />
    <!-- Burmese (Myanmar) glyph fallback so translated UI renders correctly on devices without it -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :lang(my), [lang="my"] { font-family: 'Noto Sans Myanmar', 'DM Sans', sans-serif; }

      /* Fixed-frame web-app feel — locks horizontal panning and iOS rubber-
         band scroll on the X axis only. Y-axis scroll is allowed to behave
         normally so long lists scroll properly on Android. */
      html, body {
        overflow-x: hidden;
        overscroll-behavior-x: none;
        width: 100%;
        max-width: 100vw;
      }
      body {
        /* Prevent text selection from triggering scroll on long-press */
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        max-width: 100vw;
        overflow-x: hidden;
      }
      /* Inputs still get manipulation for snappier taps */
      input, textarea, select, button { touch-action: manipulation; }
    </style>
    <title>Hoosier Boy Greenhouse Ops</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
